<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic 1.0 Earnings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1e3e 0%, #1a3a5c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }

        .header {
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 1.1rem;
            color: #b3d9ff;
            font-weight: 300;
        }

        .earnings-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .earnings-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .earnings-label {
            color: #0a1e3e;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .earnings-amount {
            color: #0a1e3e;
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1;
        }

        .earnings-currency {
            color: #1a3a5c;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .stat-box {
            background: rgba(26, 58, 92, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            background: rgba(26, 58, 92, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #b3d9ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.95rem;
            color: #b3d9ff;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .earnings-amount {
                font-size: 3rem;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Arctic 1.0</h1>
            <p>Total Earnings Dashboard</p>
        </div>

        <div class="earnings-card">
            <div class="earnings-label">Total Earned</div>
            <div>
                <span class="earnings-amount">$94.93</span>
                <div class="earnings-currency">USD</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Currency</div>
                <div class="stat-value">USD</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Status</div>
                <div class="stat-value">Active</div>
            </div>
        </div>

        <div class="footer">
            <p>💰 Keep building and growing your success</p>
        </div>
    </div>
</body>
</html>
